# ──────────────────────────────────────────
# Prefix
# ──────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ──────────────────────────────────────────
# General
# ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ──────────────────────────────────────────
# Mouse
# ──────────────────────────────────────────
set -g mouse on

# ──────────────────────────────────────────
# Splits
# ──────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ──────────────────────────────────────────
# Pane navigation (vim-style)
# ──────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ──────────────────────────────────────────
# Copy mode (vi)
# ──────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ──────────────────────────────────────────
# Reload config
# ──────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ──────────────────────────────────────────
# Status bar
# ──────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

set -g status-left-length 80
set -g status-left "#[fg=#1a1b26,bg=#7dcfff,bold]  #S #[fg=#7dcfff,bg=#292e42]#[fg=#c0caf5,bg=#292e42] #(whoami) #[fg=#292e42,bg=#1a1b26]"

set -g status-right-length 100
set -g status-right "#(~/.tmux-config/git-status.sh '#{pane_current_path}') #[fg=#292e42,bg=#1a1b26]#[fg=#c0caf5,bg=#292e42] %H:%M #[fg=#7dcfff,bg=#292e42]#[fg=#1a1b26,bg=#7dcfff,bold] %d %b "

# Window tabs
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#1a1b26,bg=#414868]#[fg=#a9b1d6,bg=#414868] #I  #W #[fg=#414868,bg=#1a1b26]"
setw -g window-status-current-format "#[fg=#1a1b26,bg=#bb9af7]#[fg=#1a1b26,bg=#bb9af7,bold] #I  #W #[fg=#bb9af7,bg=#1a1b26]"

# ──────────────────────────────────────────
# Pane borders
# ──────────────────────────────────────────
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#bb9af7"

# ──────────────────────────────────────────
# Messages & command line
# ──────────────────────────────────────────
set -g message-style "bg=#bb9af7,fg=#1a1b26,bold"
set -g message-command-style "bg=#1a1b26,fg=#7dcfff"

# ──────────────────────────────────────────
# Quick access (Alt shortcuts, no prefix needed)
# ──────────────────────────────────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind f display-popup -E -w 60% -h 60% "tmux list-windows -a -F '#{session_name}:#{window_index} — #{window_name} (#{pane_current_path})' | fzf --reverse --border --prompt='window> ' | cut -d ' ' -f1 | xargs tmux switch-client -t"
bind -n M-f display-popup -E -w 60% -h 60% "tmux list-windows -a -F '#{session_name}:#{window_index} — #{window_name} (#{pane_current_path})' | fzf --reverse --border --prompt='window> ' | cut -d ' ' -f1 | xargs tmux switch-client -t"
bind -n M-g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# ──────────────────────────────────────────
# Plugins (TPM)
# ──────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
