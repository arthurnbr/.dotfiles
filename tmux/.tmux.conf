# ──────────────────────────────────────────
# Prefix
# ──────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ──────────────────────────────────────────
# General
# ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ──────────────────────────────────────────
# Mouse
# ──────────────────────────────────────────
set -g mouse on

# ──────────────────────────────────────────
# Splits   (herdr: split_vertical=prefix+v, split_horizontal=prefix+-)
# ──────────────────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"   ;# alias tmux historique
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window/tab in current path   (herdr: new_tab=prefix+c)
bind c new-window -c "#{pane_current_path}"

# ──────────────────────────────────────────
# Pane navigation (vim-style)
# ──────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes — accès direct répétable (extra hors herdr)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Resize mode   (herdr: resize_mode=prefix+r) — h/j/k/l pour redimensionner, Esc/Enter pour sortir
bind r switch-client -T resize
bind -T resize h resize-pane -L 5  \; switch-client -T resize
bind -T resize j resize-pane -D 5  \; switch-client -T resize
bind -T resize k resize-pane -U 5  \; switch-client -T resize
bind -T resize l resize-pane -R 5  \; switch-client -T resize
bind -T resize H resize-pane -L 10 \; switch-client -T resize
bind -T resize J resize-pane -D 10 \; switch-client -T resize
bind -T resize K resize-pane -U 10 \; switch-client -T resize
bind -T resize L resize-pane -R 10 \; switch-client -T resize
bind -T resize Escape switch-client -T root
bind -T resize Enter  switch-client -T root

# ──────────────────────────────────────────
# Copy mode (vi)
# ──────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ──────────────────────────────────────────
# Reload config   (herdr: reload_config=prefix+shift+r)
# ──────────────────────────────────────────
bind R source-file ~/.tmux.conf \; display "Config reloaded!"

# ──────────────────────────────────────────
# Parité herdr — tabs / panes / workspaces
# ──────────────────────────────────────────
# Tabs (= windows)          herdr: next_tab=prefix+n, previous_tab=prefix+p
bind n next-window
bind p previous-window
# switch_tab = prefix+1..9
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
# rename_tab = prefix+shift+t   ;   close_tab = prefix+shift+x
bind T command-prompt -I "#W" "rename-window '%%'"
bind X confirm-before -p "kill window #W? (y/n)" kill-window
# close_pane = prefix+x (défaut tmux)   ;   zoom = prefix+z (défaut tmux)
# cycle_pane_next = prefix+Tab   ;   cycle_pane_previous = prefix+shift+Tab
bind Tab  select-pane -t :.+
bind BTab select-pane -t :.-
# detach = prefix+q
bind q detach-client
# Workspaces (= sessions)   workspace_picker=prefix+w, new_workspace=prefix+shift+n, rename_workspace=prefix+shift+w
bind w choose-tree -Zs
bind N command-prompt -p "nouvelle session:" "new-session -s '%%'"
bind W command-prompt -I "#S" "rename-session '%%'"

# ──────────────────────────────────────────
# Status bar
# ──────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

set -g status-left-length 80
set -g status-left "#[fg=#1a1b26,bg=#7dcfff,bold]  #S #[fg=#7dcfff,bg=#292e42]#[fg=#c0caf5,bg=#292e42] #(whoami) #[fg=#292e42,bg=#1a1b26]"

set -g status-right-length 100
set -g status-right "#(~/.tmux-config/git-status.sh '#{pane_current_path}') #[fg=#292e42,bg=#1a1b26]#[fg=#c0caf5,bg=#292e42] %H:%M #[fg=#7dcfff,bg=#292e42]#[fg=#1a1b26,bg=#7dcfff,bold] %d %b "

# Window tabs
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#1a1b26,bg=#414868]#[fg=#a9b1d6,bg=#414868] #I  #W #[fg=#414868,bg=#1a1b26]"
setw -g window-status-current-format "#[fg=#1a1b26,bg=#bb9af7]#[fg=#1a1b26,bg=#bb9af7,bold] #I  #W #[fg=#bb9af7,bg=#1a1b26]"

# ──────────────────────────────────────────
# Pane borders
# ──────────────────────────────────────────
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#bb9af7"

# ──────────────────────────────────────────
# Messages & command line
# ──────────────────────────────────────────
set -g message-style "bg=#bb9af7,fg=#1a1b26,bold"
set -g message-command-style "bg=#1a1b26,fg=#7dcfff"

# ──────────────────────────────────────────
# Quick access (Alt shortcuts, no prefix needed)
# ──────────────────────────────────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
# Fuzzy-find de window (cross-session)
bind f display-popup -E -w 60% -h 60% "tmux list-windows -a -F '#{session_name}:#{window_index} — #{window_name} (#{pane_current_path})' | fzf --reverse --border --prompt='window> ' | cut -d ' ' -f1 | xargs tmux switch-client -t"
bind -n M-f display-popup -E -w 60% -h 60% "tmux list-windows -a -F '#{session_name}:#{window_index} — #{window_name} (#{pane_current_path})' | fzf --reverse --border --prompt='window> ' | cut -d ' ' -f1 | xargs tmux switch-client -t"

# Fuzzy-find de pane cross-workspace   (herdr: goto=prefix+g) — saute vers n'importe quel pane de n'importe quelle session
bind g display-popup -E -w 80% -h 70% 'sel=$(tmux list-panes -a -F "#{session_name}:#{window_index}.#{pane_index}  #{window_name}  [#{pane_current_command}]  #{pane_current_path}" | fzf --reverse --border --prompt="pane> " | cut -d" " -f1); [ -n "$sel" ] && tmux switch-client -t "${sel%.*}" \; select-pane -t "$sel"'
bind -n M-g display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# ──────────────────────────────────────────
# Plugins (TPM)
# ──────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
