# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
# env = GDK_SCALE,2
# monitor=,preferred,auto,auto


# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.666667

# Straight 1x setup for low-resolution displays like 1080p or 1440p
env = GDK_SCALE,1
monitor=,preferred,auto,1.2

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-1, 2560x1440@180, auto, 1
# monitor = HDMI-A-1, 1920x1080@59.94, auto, 1

# Disposition physique : HDMI-A-1 (ViewSonic VX3276-QHD 32") à gauche, DP-1 (ASUS VG27AQ3A 27" 1440p) à droite
# DP-1 reste l'écran principal (workspaces 1-5)
#
# NOTE : le ViewSonic est natif 2560x1440, mais sur cette sortie HDMI (GTX 1060 + driver nvidia)
# tout mode > 1920x1080 est refusé ("failed to put new resolution, fallback to 1920x1080"),
# y compris 1440p@30. Très probablement le câble HDMI (en mettre un "Premium High Speed"/HDMI 2.0)
# ou le brancher en DisplayPort. Quand le 1440p passera, repasser HDMI-A-1 sur 2560x1440@59.95
# et déplacer DP-1 en 2560x0.
# monitor = HDMI-A-1, 2560x1440@59.95, 0x0, 1
monitor = HDMI-A-1, 1920x1080@60, 0x0, 1
monitor = DP-1, 2560x1440@60, 1920x0, 1

# Workspaces 1-5 sur l'écran principal (DP-1), 6-10 sur le secondaire
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1
