# keyd — system-wide key remapping daemon
# Repo: https://github.com/rvaiya/keyd
#
# Déployé vers /etc/keyd/default.conf par setup-arch.sh.
# Si tu modifies ce fichier, recharge avec :
#   sudo install -Dm644 ~/.dotfiles/keyd/default.conf /etc/keyd/default.conf && sudo keyd reload

[ids]
*

[main]
# Alt + HJKL → flèches (navigation vim-style partout : terminal, navigateur, GUI, TTY)
# Les autres modificateurs (Shift, Ctrl) passent à travers :
#   Shift+Alt+H = Shift+Left (sélection)
#   Ctrl+Alt+H  = Ctrl+Left  (saut de mot)
alt.h = left
alt.j = down
alt.k = up
alt.l = right
